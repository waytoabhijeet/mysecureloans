services:
  - type: web
    name: mysecureloans
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: 3000
